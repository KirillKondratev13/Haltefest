apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "5"
  labels:
    app: kafka-init
    app.kubernetes.io/part-of: haltefest
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: kafka-init
        app.kubernetes.io/part-of: haltefest
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: {{ .Values.infra.kafka.image }}
          command:
            - /bin/bash
            - -ec
            - |
              echo 'Waiting for Kafka broker to become reachable...'
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:{{ .Values.infra.kafka.port }} > /dev/null 2>&1; do
                sleep 2
              done

              echo 'Creating Kafka topics...'
{{- range .Values.infra.kafka.topics }}
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:{{ $.Values.infra.kafka.port }} --create --if-not-exists --topic '{{ . }}' --partitions 1 --replication-factor 1
{{- end }}

              echo 'Topics created:'
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:{{ .Values.infra.kafka.port }} --list
