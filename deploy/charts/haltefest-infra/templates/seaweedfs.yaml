apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-master
  labels:
    app: seaweedfs-master
    app.kubernetes.io/part-of: haltefest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs-master
  template:
    metadata:
      labels:
        app: seaweedfs-master
        app.kubernetes.io/part-of: haltefest
    spec:
      containers:
        - name: seaweedfs-master
          image: {{ .Values.infra.seaweedfs.image }}
          args: ["master"]
          ports:
            - name: master
              containerPort: {{ .Values.infra.seaweedfs.masterPort }}
          volumeMounts:
            - name: master-data
              mountPath: /data
      volumes:
        - name: master-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-master
  labels:
    app: seaweedfs-master
    app.kubernetes.io/part-of: haltefest
spec:
  selector:
    app: seaweedfs-master
  ports:
    - name: master
      port: {{ .Values.infra.seaweedfs.masterPort }}
      targetPort: master
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-volume
  labels:
    app: seaweedfs-volume
    app.kubernetes.io/part-of: haltefest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs-volume
  template:
    metadata:
      labels:
        app: seaweedfs-volume
        app.kubernetes.io/part-of: haltefest
    spec:
      initContainers:
        - name: wait-for-master
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z seaweedfs-master {{ .Values.infra.seaweedfs.masterPort }}; do echo waiting for seaweedfs-master; sleep 2; done;']
      containers:
        - name: seaweedfs-volume
          image: {{ .Values.infra.seaweedfs.image }}
          args:
            - "volume"
            - "-mserver=seaweedfs-master:{{ .Values.infra.seaweedfs.masterPort }}"
            - "-dir=/data"
          ports:
            - name: volume
              containerPort: {{ .Values.infra.seaweedfs.volumePort }}
          volumeMounts:
            - name: volume-data
              mountPath: /data
      volumes:
        - name: volume-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-volume
  labels:
    app: seaweedfs-volume
    app.kubernetes.io/part-of: haltefest
spec:
  selector:
    app: seaweedfs-volume
  ports:
    - name: volume
      port: {{ .Values.infra.seaweedfs.volumePort }}
      targetPort: volume
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-filer
  labels:
    app: seaweedfs-filer
    app.kubernetes.io/part-of: haltefest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs-filer
  template:
    metadata:
      labels:
        app: seaweedfs-filer
        app.kubernetes.io/part-of: haltefest
    spec:
      initContainers:
        - name: wait-for-master
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z seaweedfs-master {{ .Values.infra.seaweedfs.masterPort }}; do echo waiting for seaweedfs-master; sleep 2; done;']
      containers:
        - name: seaweedfs-filer
          image: {{ .Values.infra.seaweedfs.image }}
          args:
            - "filer"
            - "-master=seaweedfs-master:{{ .Values.infra.seaweedfs.masterPort }}"
          ports:
            - name: filer
              containerPort: {{ .Values.infra.seaweedfs.filerPort }}
          volumeMounts:
            - name: filer-data
              mountPath: /data
      volumes:
        - name: filer-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-filer
  labels:
    app: seaweedfs-filer
    app.kubernetes.io/part-of: haltefest
spec:
  selector:
    app: seaweedfs-filer
  ports:
    - name: filer
      port: {{ .Values.infra.seaweedfs.filerPort }}
      targetPort: filer
