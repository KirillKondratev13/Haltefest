helmDefaults:
  wait: true
  timeout: 900
  createNamespace: true

repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami

releases:
  - name: kafka
    namespace: haltefest
    chart: bitnami/kafka
    version: 26.8.0
    values:
      - ./values/kafka.yaml

  - name: haltefest-infra
    namespace: haltefest
    chart: ./charts/haltefest-infra
    needs:
      - haltefest/kafka
    values:
      - ./values/infra.yaml

  - name: haltefest-app
    namespace: haltefest
    chart: ./charts/haltefest-app
    needs:
      - haltefest/kafka
      - haltefest/haltefest-infra
    values:
      - ./values/app.yaml