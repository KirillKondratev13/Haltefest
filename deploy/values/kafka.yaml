# values/kafka.yaml
# Kafka cluster configuration for local Haltefest development

# Image override - use GHCR legacy images (Docker Hub tags removed)
image:
  registry: ghcr.io
  repository: element-hq/bitnamilegacy/kafka
  tag: 3.7.1-debian-12-r4
  pullPolicy: IfNotPresent

# Enable KRaft mode (Kafka without ZooKeeper)
kraft:
  enabled: true

# Single controller node (also acts as broker since controllerOnly=false by default)
controller:
  replicaCount: 1
  # controllerOnly: false  # default - controller also serves as broker

# No dedicated broker-only nodes; the controller will also handle broker responsibilities
broker:
  replicaCount: 0

# Listener configuration - all PLAINTEXT for local dev (no SASL/SSL)
listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT

# Inter-broker protocol version
interBrokerProtocolVersion: "3.7"

# Service configuration
service:
  type: ClusterIP
  ports:
    client: 9092
    controller: 9093

# Disable persistence for local dev (ephemeral storage)
persistence:
  enabled: false

# Resource limits (optional - adjust based on available resources)
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Health checks
healthProbes:
  liveness:
    enabled: true
  readiness:
    enabled: true
  startup:
    enabled: true

# Logging
logs:
  level: "INFO"

# Provision initial topics via Bitnami Kafka provisioning job.
# This keeps topic bootstrap inside the Kafka release and avoids
# relying on broker-side auto creation.
provisioning:
  enabled: true
  waitForKafka: true
  useHelmHooks: true
  numPartitions: 1
  replicationFactor: 1
  topics:
    - name: files-to-parse
    - name: text-to-classify
    - name: text-to-index
    - name: analysis-requested
    - name: analysis-dlq
    - name: chat-requested
    - name: chat-dlq

# Additional Kafka server properties (appended to generated config)
extraConfig: |
  log.retention.hours=24
  log.retention.bytes=1073741824
  default.replication.factor=1
  min.insync.replicas=1
  auto.create.topics.enable=false
  offsets.topic.replication.factor=1
  offsets.topic.num.partitions=1
  transaction.state.log.replication.factor=1
  transaction.state.log.min.isr=1
  transaction.state.log.num.partitions=1
  group.initial.rebalance.delay.ms=0
