version: '3.3'

services:
  app:
    build: .
    container_name: myapp
    ports:
      - "8081:8081"
    environment:
      - SERVER_ADDR=:8081
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
      - FILER_URL=http://seaweedfs-filer:8888
      - ASSETS_DIR=./web/public/assets
    depends_on:
      - postgres
      - seaweedfs-filer
    restart: always

  postgres:
    image: postgres:15
    container_name: myapp-postgres
    environment:
      - POSTGRES_USER=myappuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=myapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Master-сервер
  seaweedfs-master:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-master
    command: "master"
    ports:
      - "9333:9333"
    volumes:
      - ./seaweedfs_data/master:/data
    restart: always

  # Volume-сервер для хранения данных
  seaweedfs-volume:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -dir=/data"
    ports:
      - "8080:8080"
    depends_on:
      - seaweedfs-master
    volumes:
      - ./seaweedfs_data/volume:/data
    restart: always

  # Filer
  seaweedfs-filer:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-filer
    command: "filer -master=seaweedfs-master:9333"
    ports:
      - "8888:8888"
    depends_on:
      - seaweedfs-master
    volumes:
      - ./seaweedfs_data/filer:/data
    restart: always

volumes:
  postgres_data:
