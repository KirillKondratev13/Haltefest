version: '3.3'

services:
  backend:
    build: services/backend
    container_name: haltefest-backend
    ports:
      - "8081:8081"
    environment:
      - SERVER_ADDR=:8081
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
      - FILER_URL=http://seaweedfs-filer:8888
      - ASSETS_DIR=./web/public/assets
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - seaweedfs-filer
      - kafka
    restart: always

  parser:
    build: services/parser
    container_name: haltefest-parser
    environment:
      - KAFKA_BROKERS=kafka:9092
      - FILER_URL=http://seaweedfs-filer:8888
      - REDIS_URL=redis://dragonfly:6379
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
    depends_on:
      - kafka
      - seaweedfs-filer
      - dragonfly
    restart: always

  ml:
    build: services/ml
    container_name: haltefest-ml
    environment:
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://dragonfly:6379
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
    depends_on:
      - kafka
      - dragonfly
      - postgres
    restart: always

  postgres:
    image: postgres:15
    container_name: haltefest-postgres
    environment:
      - POSTGRES_USER=myappuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=myapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  dragonfly:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    container_name: haltefest-dragonfly
    ports:
      - "6379:6379"
    ulimits:
      memlock: -1
    restart: always

  kafka:
    image: bitnami/kafka:latest
    container_name: haltefest-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    restart: always

  seaweedfs-master:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-master
    command: "master"
    ports:
      - "9333:9333"
    volumes:
      - ./seaweedfs_data/master:/data
    restart: always

  seaweedfs-volume:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -dir=/data"
    ports:
      - "8080:8080"
    depends_on:
      - seaweedfs-master
    volumes:
      - ./seaweedfs_data/volume:/data
    restart: always

  seaweedfs-filer:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-filer
    command: "filer -master=seaweedfs-master:9333"
    ports:
      - "8888:8888"
    depends_on:
      - seaweedfs-master
    volumes:
      - ./seaweedfs_data/filer:/data
    restart: always

volumes:
  postgres_data:
