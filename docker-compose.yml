version: '3'

services:
  master:
    image: chrislusf/seaweedfs
    ports:
      - '9333:9333'
      - '19333:19333' # GRPC API (по желанию)
    command: 'master -ip=master -ip.bind=0.0.0.0'

  volume:
    image: chrislusf/seaweedfs
    ports:
      - '8080:8080'
    command: 'volume -mserver="master:9333" -port=8080 -ip=volume'
    depends_on:
      - master

