# Removed obsolete version attribute

services:
  backend:
    build: services/backend
    container_name: haltefest-backend
    ports:
      - "8081:8081"
    environment:
      - SERVER_ADDR=:8081
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
      - FILER_URL=http://seaweedfs-filer:8888
      - ASSETS_DIR=./web/public/assets
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_started
      seaweedfs-filer:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      dragonfly:
        condition: service_started
      seaweedfs-volume:
        condition: service_started
    restart: always

  parser:
    build: services/parser
    container_name: haltefest-parser
    environment:
      - KAFKA_BROKERS=kafka:9092
      - FILER_URL=http://seaweedfs-filer:8888
      - REDIS_URL=redis://dragonfly:6379
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
      - PARSER_VERSION=parser-2.0.0-liteparse
      - TEXT_CANONICAL_PREFIX=/texts
      - LITEPARSE_OCR_ENABLED=false
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      seaweedfs-filer:
        condition: service_started
      seaweedfs-volume:
        condition: service_started
      dragonfly:
        condition: service_started
      postgres:
        condition: service_started
    restart: always

  ml:
    build:
      context: services/ml
      args:
        MODEL_NAME: chandar-lab/NeoBERT
    container_name: haltefest-ml
    environment:
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://dragonfly:6379
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
      - TAGS_FILE=/app/tags.txt
      - MODEL_NAME=chandar-lab/NeoBERT
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      dragonfly:
        condition: service_started
      postgres:
        condition: service_started
    volumes:
      - ml_model_cache:/app/model_cache
    restart: always

  indexer:
    build: services/indexer
    container_name: haltefest-indexer
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
      - FILER_URL=http://seaweedfs-filer:8888
      - KAFKA_TEXT_TO_INDEX_TOPIC=text-to-index
      - KAFKA_ANALYSIS_DLQ_TOPIC=analysis-dlq
      - KAFKA_CONSUMER_GROUP=indexer_service_group
      - MAX_ATTEMPTS=6
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - EMBEDDING_MODEL_VERSION=bge-small-en-v1.5
      - CHUNKING_VERSION=chunking-v1
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      seaweedfs-filer:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - embedding_model_cache:/root/.cache/huggingface
    restart: always

  llm-analysis:
    build: services/llm_analysis
    container_name: haltefest-llm-analysis
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
      - FILER_URL=http://seaweedfs-filer:8888
      - KAFKA_ANALYSIS_REQUESTED_TOPIC=analysis-requested
      - KAFKA_ANALYSIS_DLQ_TOPIC=analysis-dlq
      - KAFKA_CHAT_REQUESTED_TOPIC=chat-requested
      - KAFKA_CHAT_DLQ_TOPIC=chat-dlq
      - KAFKA_CONSUMER_GROUP=llm_analysis_group
      - MAX_ATTEMPTS=6
      - LLM_TIMEOUT_SECONDS=120
      - LLM_MODEL_NAME=haltefest-qwen
      - LLM_MODEL_VERSION=qwen2.5-0.5b
      - PROMPT_VERSION=analysis-v1
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - LLM_MODEL=haltefest-qwen
      - LLM_MODEL_FALLBACKS=qwen2.5:1.5b
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-4096}
      - GIGACHAT_AUTH_URL=${GIGACHAT_AUTH_URL:-https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
      - GIGACHAT_API_URL=${GIGACHAT_API_URL:-https://gigachat.devices.sberbank.ru/api/v1}
      - GIGACHAT_SCOPE=${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      - GIGACHAT_MODEL=${GIGACHAT_MODEL:-GigaChat}
      - GIGACHAT_TIMEOUT_SECONDS=${GIGACHAT_TIMEOUT_SECONDS:-120}
      - GIGACHAT_VERIFY_SSL=${GIGACHAT_VERIFY_SSL:-false}
      - GIGACHAT_AUTH_KEY=${GIGACHAT_AUTH_KEY:-}
      - GIGACHAT_CLIENT_ID=${GIGACHAT_CLIENT_ID:-}
      - GIGACHAT_CLIENT_SECRET=${GIGACHAT_CLIENT_SECRET:-}
      - GIGACHAT_TOKEN_REFRESH_SKEW_SECONDS=${GIGACHAT_TOKEN_REFRESH_SKEW_SECONDS:-60}
      - DOC_CHAT_EMBEDDING_MODEL=${DOC_CHAT_EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - DOC_CHAT_SEMANTIC_TOP_K=${DOC_CHAT_SEMANTIC_TOP_K:-10}
      - DOC_CHAT_BM25_TOP_K=${DOC_CHAT_BM25_TOP_K:-10}
      - DOC_CHAT_RRF_K=${DOC_CHAT_RRF_K:-60}
      - DOC_CHAT_HYBRID_FUSED_LIMIT=${DOC_CHAT_HYBRID_FUSED_LIMIT:-40}
      - DOC_CHAT_BM25_PAGE_SIZE=${DOC_CHAT_BM25_PAGE_SIZE:-256}
      - DOC_CHAT_BM25_MAX_CHUNKS=${DOC_CHAT_BM25_MAX_CHUNKS:-3000}
      - RERANKER_URL=${RERANKER_URL:-http://reranker:8090}
      - RERANKER_TIMEOUT_SECONDS=${RERANKER_TIMEOUT_SECONDS:-60}
      - DOC_CHAT_RERANK_TOP_K=${DOC_CHAT_RERANK_TOP_K:-20}
      - DOC_CHAT_MODEL_CONTEXT_WINDOW_TOKENS=${DOC_CHAT_MODEL_CONTEXT_WINDOW_TOKENS:-32000}
      - DOC_CHAT_SINGLE_DOC_THRESHOLD_TOKENS=${DOC_CHAT_SINGLE_DOC_THRESHOLD_TOKENS:-0}
      - DOC_CHAT_RESERVED_SYSTEM_TOKENS=${DOC_CHAT_RESERVED_SYSTEM_TOKENS:-400}
      - DOC_CHAT_RESERVED_HISTORY_TOKENS=${DOC_CHAT_RESERVED_HISTORY_TOKENS:-0}
      - DOC_CHAT_RESERVED_OUTPUT_TOKENS=${DOC_CHAT_RESERVED_OUTPUT_TOKENS:-700}
      - DOC_CHAT_SAFETY_MARGIN_TOKENS=${DOC_CHAT_SAFETY_MARGIN_TOKENS:-300}
      - DOC_CHAT_CONTEXT_MAX_CHARS=${DOC_CHAT_CONTEXT_MAX_CHARS:-18000}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      seaweedfs-filer:
        condition: service_started
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
      reranker:
        condition: service_started
    volumes:
      - embedding_model_cache:/root/.cache/huggingface
    restart: always

  reranker:
    build: services/reranker
    container_name: haltefest-reranker
    ports:
      - "8090:8090"
    environment:
      - RERANKER_MODEL_NAME=${RERANKER_MODEL_NAME:-BAAI/bge-reranker-v2-m3}
      - RERANKER_DEVICE=${RERANKER_DEVICE:-cpu}
      - RERANKER_BATCH_SIZE=${RERANKER_BATCH_SIZE:-16}
      - RERANKER_MAX_CANDIDATES=${RERANKER_MAX_CANDIDATES:-200}
      - RERANKER_DEFAULT_TOP_K=${RERANKER_DEFAULT_TOP_K:-40}
    volumes:
      - embedding_model_cache:/root/.cache/huggingface
    restart: always

  postgres:
    image: postgres:15
    container_name: haltefest-postgres
    environment:
      - POSTGRES_USER=myappuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=myapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  dragonfly:
    image: "dragonflydb/dragonfly:v1.27.1"
    container_name: haltefest-dragonfly
    ports:
      - "6379:6379"
    ulimits:
      memlock: -1
    restart: always

  kafka:
    image: apache/kafka:latest
    container_name: haltefest-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_METADATA_MAX_AGE_MS=5000
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server
        localhost:9092 > /dev/null 2>&1
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    restart: always

  kafka-init:
    image: apache/kafka:latest
    container_name: haltefest-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        echo 'Creating Kafka topics...'
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic files-to-parse --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic text-to-classify --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic text-to-index --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic analysis-requested --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic analysis-dlq --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic chat-requested --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic chat-dlq --partitions 1 --replication-factor 1
        echo 'Topics created:'
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  seaweedfs-master:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-master
    command: "master"
    ports:
      - "9333:9333"
    volumes:
      - ./seaweedfs_data/master:/data
    restart: always

  seaweedfs-volume:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -dir=/data"
    ports:
      - "8080:8080"
    depends_on:
      - seaweedfs-master
    volumes:
      - ./seaweedfs_data/volume:/data
    restart: always

  seaweedfs-filer:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-filer
    command: "filer -master=seaweedfs-master:9333"
    ports:
      - "8888:8888"
    depends_on:
      - seaweedfs-master
    volumes:
      - ./seaweedfs_data/filer:/data
    restart: always

  qdrant:
    image: qdrant/qdrant
    container_name: haltefest-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  ollama:
    image: ollama/ollama:0.20.2
    container_name: haltefest-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  ollama-init:
    image: ollama/ollama:0.20.2
    container_name: haltefest-ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.3}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-4096}
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./scripts/ollama-init.sh:/ollama-init.sh:ro
    entrypoint: [ "/bin/sh", "/ollama-init.sh" ]
    restart: "no"

  log-collector:
    image: docker:cli
    container_name: haltefest-log-collector
    depends_on:
      backend:
        condition: service_started
      parser:
        condition: service_started
      ml:
        condition: service_started
      indexer:
        condition: service_started
      llm-analysis:
        condition: service_started
      reranker:
        condition: service_started
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
      postgres:
        condition: service_started
      dragonfly:
        condition: service_started
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      seaweedfs-master:
        condition: service_started
      seaweedfs-volume:
        condition: service_started
      seaweedfs-filer:
        condition: service_started
    entrypoint: [ "/bin/sh", "/scripts/collect-container-logs.sh" ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/logs
      - ./scripts:/scripts:ro
    restart: always
volumes:
  postgres_data:
  ml_model_cache:
  qdrant_data:
  ollama_data:
  embedding_model_cache:
