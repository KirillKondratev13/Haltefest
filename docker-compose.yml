# Removed obsolete version attribute

services:
  backend:
    build: services/backend
    container_name: haltefest-backend
    ports:
      - "8081:8081"
    environment:
      - SERVER_ADDR=:8081
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
      - FILER_URL=http://seaweedfs-filer:8888
      - ASSETS_DIR=./web/public/assets
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_started
      seaweedfs-filer:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      dragonfly:
        condition: service_started
      seaweedfs-volume:
        condition: service_started
    restart: always

  parser:
    build: services/parser
    container_name: haltefest-parser
    environment:
      - KAFKA_BROKERS=kafka:9092
      - FILER_URL=http://seaweedfs-filer:8888
      - REDIS_URL=redis://dragonfly:6379
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      seaweedfs-filer:
        condition: service_started
      seaweedfs-volume:
        condition: service_started
      dragonfly:
        condition: service_started
      postgres:
        condition: service_started
    restart: always

  ml:
    build:
      context: services/ml
      args:
        MODEL_NAME: chandar-lab/NeoBERT
    container_name: haltefest-ml
    environment:
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://dragonfly:6379
      - DB_CONN_STR=postgres://myappuser:mypassword@postgres:5432/myapp
      - TAGS_FILE=/app/tags.txt
      - MODEL_NAME=chandar-lab/NeoBERT
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      dragonfly:
        condition: service_started
      postgres:
        condition: service_started
    volumes:
      - ml_model_cache:/app/model_cache
    restart: always

  postgres:
    image: postgres:15
    container_name: haltefest-postgres
    environment:
      - POSTGRES_USER=myappuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=myapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  dragonfly:
    image: 'dragonflydb/dragonfly:v1.27.1'
    container_name: haltefest-dragonfly
    ports:
      - "6379:6379"
    ulimits:
      memlock: -1
    restart: always

  kafka:
    image: apache/kafka:latest
    container_name: haltefest-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_METADATA_MAX_AGE_MS=5000
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    restart: always

  kafka-init:
    image: apache/kafka:latest
    container_name: haltefest-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo 'Creating Kafka topics...'
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic files-to-parse --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic text-to-classify --partitions 1 --replication-factor 1
        echo 'Topics created:'
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  seaweedfs-master:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-master
    command: "master"
    ports:
      - "9333:9333"
    volumes:
      - ./seaweedfs_data/master:/data
    restart: always

  seaweedfs-volume:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -dir=/data"
    ports:
      - "8080:8080"
    depends_on:
      - seaweedfs-master
    volumes:
      - ./seaweedfs_data/volume:/data
    restart: always

  seaweedfs-filer:
    image: chrislusf/seaweedfs
    container_name: seaweedfs-filer
    command: "filer -master=seaweedfs-master:9333"
    ports:
      - "8888:8888"
    depends_on:
      - seaweedfs-master
    volumes:
      - ./seaweedfs_data/filer:/data
    restart: always
volumes:
  postgres_data:
  ml_model_cache:
