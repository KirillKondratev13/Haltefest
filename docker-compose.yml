version: '3'

services:
  seaweedfs_master:
    image: chrislusf/seaweedfs
    command: "master -ip=seaweedfs_master"
    ports:
      - "9333:9333"  # Web-интерфейс и API
    volumes:
      - seaweedfs_data:/data

  seaweedfs_volume:
    image: chrislusf/seaweedfs
    command: "volume -mserver=seaweedfs_master:9333 -port=8080"
    depends_on:
      - seaweedfs_master
    ports:
      - "8080:8080"  # Для загрузки файлов
    volumes:
      - seaweedfs_data:/data

volumes:
  seaweedfs_data:
